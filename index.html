<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Kairos - Personal Page</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        /* CSS VARIABLES (Wine & Dark Teal Mode) */
        :root {
            --bg-body: #0b1d28;        
            --bg-card: #122836;        
            --bg-input: #193446;       
            --border-color: #204156;   
            --text-main: #e2e8f0;      
            --text-muted: #d3a284;     /* Sand / Krem Hangat */
            --text-heading: #ffffff;   
            --accent: #581c24;         /* Wine */
            --nav-bg: rgba(7, 21, 30, 0.75); /* Transparan untuk efek blur */       
            --nav-border: rgba(18, 40, 54, 0.6);
        }

        [data-theme="light"] {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #581c24;     
            --text-heading: #0b1d28;
            --accent: #d3a284;         
            --nav-bg: rgba(255, 255, 255, 0.75); /* Transparan untuk efek blur */
            --nav-border: rgba(226, 232, 240, 0.6);
        }

        /* RESET & BASE THEME */
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 300; 
            margin: 0; 
            padding: 0; 
            line-height: 1.8; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* TYPOGRAPHY SETTINGS */
        h1, h2, h3 { 
            font-family: 'Bodoni Moda', serif; 
            color: var(--text-heading); 
            margin-top: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h1 { font-size: 3.5rem; }
        h2 { 
            font-size: 2.2rem; 
            border-left: 4px solid var(--text-muted); 
            padding-left: 15px; 
            font-style: normal; 
            font-weight: 700;
        }
        h3 { font-size: 1.6rem; }
        @media (max-width: 767px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.8rem; }
        }

        p, li, textarea {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300; 
            letter-spacing: 0.3px;
        }

        /* NAVIGATION BAR (TRANSPARAN + BLURRY) */
        header { 
            background: var(--nav-bg); 
            border-bottom: 1px solid var(--nav-border);
            padding: 15px 20px; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000;
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        @media (min-width: 768px) { nav { justify-content: flex-start; } }
        nav a { 
            color: #cbd5e1; 
            text-decoration: none; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 500; 
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        nav a:hover { color: var(--text-muted); }
        nav a.active {
            color: #ffffff !important;
            background-color: var(--accent); 
            box-shadow: 0 0 12px rgba(88, 28, 36, 0.4);
        }

        /* TOGGLE BUTTON STYLE WITH "☾" & "☼" */
        .theme-toggle-btn {
            background: var(--bg-input);
            color: var(--text-heading);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-left: auto; 
            position: relative;
            z-index: 1010; 
            user-select: none;
        }
        .theme-toggle-btn:hover {
            border-color: var(--text-muted);
            background: var(--border-color);
        }
        #themeIcon {
            font-size: 1.1rem;
            line-height: 1;
            color: var(--text-muted); 
        }

        /* EFEK FADE IN - FADE OUT (MURNI TRANSPARANSI, SANGAT SMOOTH) */
        .pop-section {
            opacity: 0;
            /* Menghapus efek scale() dan translateY() agar posisi kotak tetap stabil tanpa lompatan */
            transition: opacity 0.8s ease-in-out; 
            will-change: opacity; /* Mengoptimalkan performa render browser */
        }
        .pop-section.visible {
            opacity: 1;
        }

        /* LAYOUT SECTIONS */
        section { 
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 15px 40px 15px; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        @media (min-width: 768px) { section { padding: 140px 20px 60px 20px; } }

        /* BOX CARDS */
        .box { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, border-color 0.3s ease;
            position: relative; 
        }
        @media (min-width: 768px) { .box { padding: 25px; } }

        /* LIVE EDITABLE AREA */
        .editable-area {
            outline: none;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }
        .
